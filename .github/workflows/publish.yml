name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - run: uv run pytest

  publish:
    runs-on: ubuntu-latest
    needs: test
    environment: release
    permissions:
      id-token: write  # for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history for dynamic versioning from tags
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv build
      - run: uv publish
